name: truthful-attribution-gate

# Thin caller for the org-reusable truthful-attribution-gate (cinatra-ai/ci),
# per the ratified org truthful-attribution spec.
#
# WARN mode (advisory rollout): the gate computes presence + anti-fabrication
# findings and ANNOTATES them, but the check is ALWAYS green — it never fails or
# blocks a PR. No `.github/gate-suite.json` is committed here (WARN scope
# exercises presence + the human arm; the gate-suite arm is not exercised without
# a committed suite). This caller is NOT a required status check and adds no
# branch-protection change; PRs continue to merge under existing protection.
#
# Double-pinned: the reusable workflow is pinned to an immutable commit SHA AND
# carries the moving ci version marker comment on the `uses:` line below, exactly
# like the other cinatra-ai/ci gate callers in this repo.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read
  checks: read
  # actions:read is required by the re-pinned reusable engine: it resolves a
  # reusable-workflow check-run to its Actions run (GET /actions/runs/{id}) to
  # verify referenced_workflows[] at the pinned SHA. A called reusable workflow's
  # permissions cannot EXCEED the caller's grant, so the caller must grant
  # actions:read or the run fails to start (startup_failure), which WARN mode
  # cannot rescue (it fails before any step runs). Do not drop this line.
  actions: read

jobs:
  truthful-attribution-gate:                 # caller job id MUST stay this exact string
    uses: cinatra-ai/ci/.github/workflows/truthful-attribution-gate.yml@8eede1022e835997d94974e4bd6205daf72131a2 # v0.1.0
    with:
      mode: warn
      ref: 8eede1022e835997d94974e4bd6205daf72131a2
